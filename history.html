<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade History — yvco.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f12; --surface:#141720; --surface2:#1c2130;
    --border:rgba(255,255,255,0.07); --border-active:rgba(255,255,255,0.18);
    --text:#e8eaf0; --text-muted:#5a6070; --text-dim:#8a94a8;
    --accent:#4f9eff; --accent-dim:rgba(79,158,255,0.12);
    --teal:#00d4a1; --teal-dim:rgba(0,212,161,0.1);
    --amber:#f5a623; --amber-dim:rgba(245,166,35,0.1);
    --purple:#a78bfa; --purple-dim:rgba(167,139,250,0.1);
    --coral:#ff6b6b; --coral-dim:rgba(255,107,107,0.1);
    --red:#ef4444; --green:#22c55e; --green-dim:rgba(34,197,94,0.1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:32px 16px 80px;}
  .app-wrapper{max-width:1100px;margin:0 auto;}

  /* Header */
  header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:36px;gap:12px;}
  .header-left h1{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;letter-spacing:-.5px;}
  .header-left p{font-size:13px;color:var(--text-muted);margin-top:4px;}
  .header-left .creator{font-size:11px;font-family:'Space Mono',monospace;color:var(--amber);margin-top:6px;letter-spacing:.04em;}
  .header-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;}
  .btn-icon{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font-size:12px;font-family:'DM Sans',sans-serif;padding:7px 14px;border-radius:8px;cursor:pointer;transition:all .15s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
  .btn-icon:hover{border-color:var(--border-active);color:var(--text);background:var(--surface2);}

  /* Stats */
  .stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
  .stat-label{font-size:11px;font-family:'Space Mono',monospace;color:var(--text-muted);letter-spacing:.04em;margin-bottom:6px;}
  .stat-val{font-size:22px;font-family:'Space Mono',monospace;color:var(--text);}
  .stat-val.win{color:var(--teal);}
  .stat-val.loss{color:var(--red);}
  .stat-val.pending{color:var(--amber);}
  .stat-val.winrate{color:var(--accent);}

  /* Sort indicator */
  th.sortable{cursor:pointer;user-select:none;}
  th.sortable:hover{color:var(--text);}
  th.sortable .sort-arrow{margin-left:4px;opacity:0.4;font-size:9px;}
  th.sortable.sorted-asc .sort-arrow::after{content:'↑';opacity:1;color:var(--accent);}
  th.sortable.sorted-desc .sort-arrow::after{content:'↓';opacity:1;color:var(--accent);}
  th.sortable:not(.sorted-asc):not(.sorted-desc) .sort-arrow::after{content:'↕';}

  /* Ticker search */
  .ticker-search{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 10px;outline:none;transition:border-color .15s;width:110px;}
  .ticker-search:focus{border-color:var(--accent);}
  .ticker-search::placeholder{color:var(--text-muted);}

  /* Filters */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
  .filter-label{font-size:11px;font-family:'Space Mono',monospace;color:var(--text-muted);letter-spacing:.04em;}
  .filter-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);transition:all .15s;}
  .filter-btn:hover{border-color:var(--border-active);color:var(--text);}
  .filter-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
  .filter-btn.win.active{background:var(--teal-dim);border-color:var(--teal);color:var(--teal);}
  .filter-btn.loss.active{background:rgba(239,68,68,0.1);border-color:var(--red);color:var(--red);}
  .filter-btn.breakeven.active{background:var(--amber-dim);border-color:var(--amber);color:var(--amber);}
  .filter-btn.pending.active{background:var(--surface2);border-color:var(--text-muted);color:var(--text-dim);}

  /* Date range filter */
  .date-filter{display:flex;align-items:center;gap:6px;margin-left:4px;}
  .date-inp{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 10px;outline:none;cursor:pointer;color-scheme:dark;transition:border-color .15s;}
  .date-inp:focus{border-color:var(--accent);}
  .date-sep{font-size:11px;color:var(--text-muted);}
  .date-clear{background:transparent;border:none;color:var(--text-muted);font-size:11px;cursor:pointer;padding:0 4px;font-family:'DM Sans',sans-serif;}
  .date-clear:hover{color:var(--red);}

  /* Empty value */
  .empty-val{color:rgba(90,96,112,0.4);font-family:'Space Mono',monospace;font-size:11px;}
  .table-wrap{border:1px solid var(--border);border-radius:14px;overflow:hidden;overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead tr{background:var(--surface2);}
  th{padding:11px 14px;text-align:left;font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap;vertical-align:middle;}
  td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text-dim);vertical-align:middle;white-space:nowrap;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:rgba(255,255,255,0.02);}
  td.mono{font-family:'Space Mono',monospace;font-size:11px;}

  /* Outcome badge */
  .badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-family:'Space Mono',monospace;font-weight:600;}
  .badge-Pending{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}
  .badge-Win{background:var(--teal-dim);color:var(--teal);}
  .badge-Loss{background:rgba(239,68,68,0.1);color:var(--red);}
  .badge-Breakeven{background:var(--amber-dim);color:var(--amber);}

  /* Outcome select */
  .outcome-sel{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;padding:5px 8px;outline:none;cursor:pointer;transition:border-color .15s;}
  .outcome-sel:focus{border-color:var(--accent);}

  /* Trade type pill */
  .type-pill{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-family:'Space Mono',monospace;font-weight:600;}
  .type-Reversal{background:var(--purple-dim);color:var(--purple);}
  .type-Continuation{background:var(--teal-dim);color:var(--teal);}

  /* Execution columns — subtle tint + separator */
  .exec-col{background:rgba(79,158,255,0.04);}
  .exec-sep{border-left:1px solid rgba(79,158,255,0.25)!important;}

  /* Dark scrollbar */
  .table-wrap{scrollbar-width:thin;scrollbar-color:#2a3040 #141720;}
  .table-wrap::-webkit-scrollbar{height:6px;}
  .table-wrap::-webkit-scrollbar-track{background:#141720;border-radius:999px;}
  .table-wrap::-webkit-scrollbar-thumb{background:#2a3040;border-radius:999px;}
  .table-wrap::-webkit-scrollbar-thumb:hover{background:#3a4255;}

  /* Delete button */
  .del-btn{background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .15s;flex-shrink:0;}
  .del-btn:hover{color:var(--red);background:rgba(239,68,68,0.1);}

  /* Empty state */
  .empty{padding:60px 20px;text-align:center;color:var(--text-muted);}
  .empty h3{font-family:'Space Mono',monospace;font-size:14px;margin-bottom:8px;color:var(--text-dim);}
  .empty p{font-size:13px;}

  /* Loading */
  .loading{padding:40px;text-align:center;font-family:'Space Mono',monospace;font-size:12px;color:var(--text-muted);}

  /* Toast */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--teal);color:#0d1a14;font-size:13px;font-weight:600;padding:10px 20px;border-radius:10px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;font-family:'DM Sans',sans-serif;z-index:9999;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #toast.error{background:var(--red);color:#fff;}

  /* Responsive */
  @media(max-width:600px){
    .stats-row{grid-template-columns:1fr 1fr;}
    body{padding:16px 12px 60px;}
    header{flex-direction:column;gap:10px;}
    .filters{gap:6px;}
    .filter-btn{padding:5px 10px;font-size:11px;}
    .date-filter{margin-left:0;flex-wrap:wrap;gap:4px;}
    .date-inp{width:100%;font-size:11px;}
    .ticker-search{width:100%;}
    .header-actions{flex-wrap:wrap;gap:6px;}
  }
</style>
</head>
<body>
<div class="app-wrapper">

  <header>
    <div class="header-left">
      <h1>Trade History</h1>
      <p>All saved trade setups</p>
      <div class="creator">by yvco.</div>
    </div>
    <div class="header-actions">
      <a class="btn-icon" href="/">Checklist</a>
      <button class="btn-icon" onclick="exportCSV()">Export CSV</button>
      <button class="btn-icon" onclick="loadTrades()">Refresh</button>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">TOTAL TRADES</div>
      <div class="stat-val" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">WIN</div>
      <div class="stat-val win" id="stat-win">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">LOSS</div>
      <div class="stat-val loss" id="stat-loss">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">PENDING</div>
      <div class="stat-val pending" id="stat-pending">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">WIN RATE</div>
      <div class="stat-val winrate" id="stat-winrate">—</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <span class="filter-label">FILTER:</span>
    <button class="filter-btn active" data-filter="All" onclick="setFilter('All',this)">All</button>
    <button class="filter-btn pending" data-filter="Pending" onclick="setFilter('Pending',this)">Pending</button>
    <button class="filter-btn win" data-filter="Win" onclick="setFilter('Win',this)">Win</button>
    <button class="filter-btn loss" data-filter="Loss" onclick="setFilter('Loss',this)">Loss</button>
    <button class="filter-btn breakeven" data-filter="Breakeven" onclick="setFilter('Breakeven',this)">Breakeven</button>
    <input type="text" class="ticker-search" id="ticker-search" placeholder="Ticker…" oninput="renderTable()" />
    <div class="date-filter">
      <span class="date-sep">|</span>
      <input type="date" class="date-inp" id="date-from" onchange="applyDateFilter()" />
      <span class="date-sep">→</span>
      <input type="date" class="date-inp" id="date-to" onchange="applyDateFilter()" />
      <button class="date-clear" onclick="clearDateFilter()" title="Clear dates">✕</button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th class="sortable sorted-desc" id="sort-date" onclick="toggleSort()">Date <span class="sort-arrow"></span></th>
          <th>Ticker</th>
          <th>Type</th>
          <th>Approach</th>
          <th>Anchor</th>
          <th>4H Candle</th>
          <th>Entry TF</th>
          <th>Structure</th>
          <th>LTF Level</th>
          <th>Ratio</th>
          <th>Projected Target</th>
          <th class="exec-sep exec-col">Entry</th>
          <th class="exec-col">Exit</th>
          <th class="exec-col">Target Status</th>
          <th class="exec-col">Achieved Target</th>
          <th class="exec-col">Result</th>
          <th style="border-left:1px solid rgba(79,158,255,0.2);background:rgba(79,158,255,0.02);white-space:nowrap;">News</th>
          <th style="background:rgba(79,158,255,0.02);"></th>
        </tr>
      </thead>
      <tbody id="trades-body">
        <tr><td colspan="19"><div class="loading">Loading trades…</div></td></tr>
      </tbody>
    </table>
  </div>

</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://raiojzsbgftepxhahkly.supabase.co';
const SUPABASE_KEY = 'sb_publishable_kglok1CLL_oVfzAtCiXk1g_FPAmdjAD';

let allTrades = [];
let currentFilter = 'All';
let sortAsc = false; // default: newest first (desc)

// ── Export CSV ───────────────────────────────
function exportCSV(){
  const trades = getFilteredTrades();
  if(!trades.length){ showToast('No trades to export', true); return; }

  const cols = [
    'id','trade_date','day','ticker','trade_type','approach','anchor',
    'candle','entry_tf','structure','ltf_level','ratio','target',
    'entry_time','exit_time','achieved_target','actual_result','outcome','news','created_at'
  ];
  const headers = [
    'ID','Date','Day','Ticker','Type','Approach','Anchor',
    '4H Candle','Entry TF','Structure','LTF Level','Ratio','Projected Target',
    'Entry','Exit','Target Status','Achieved Target','Result','News','Created At'
  ];
  const escape = v => {
    if(v === null || v === undefined) return '';
    return '"' + String(v).replace(/"/g, '""') + '"';
  };
  const rows = [
    headers.join(','),
    ...trades.map(t => cols.map(c => escape(t[c])).join(','))
  ].join('\r\n');

  const blob = new Blob([rows], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'trade_history_' + new Date().toLocaleDateString('en-CA') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exported ✓');
}

// ── Load trades ──────────────────────────────
async function loadTrades(){
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/trades?select=*&order=created_at.desc', {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      }
    });
    if(!res.ok) throw new Error('Failed to load');
    allTrades = await res.json();
    updateStats();
    renderTable();
  } catch(err){
    document.getElementById('trades-body').innerHTML =
      `<tr><td colspan="19"><div class="empty"><h3>Could not load trades</h3><p>${err.message}</p></div></td></tr>`;
  }
}

// ── Stats — reflects current filter ──────────
function updateStats(){
  const trades  = getFilteredTrades();
  const total   = trades.length;
  const wins    = trades.filter(t=>t.outcome==='Win').length;
  const losses  = trades.filter(t=>t.outcome==='Loss').length;
  const pending = trades.filter(t=>t.outcome==='Pending').length;
  const closed  = wins + losses + trades.filter(t=>t.outcome==='Breakeven').length;
  const winRate = closed > 0 ? ((wins / closed) * 100).toFixed(1) + '%' : '—';
  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-win').textContent     = wins;
  document.getElementById('stat-loss').textContent    = losses;
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-winrate').textContent = winRate;
}

// ── Get filtered trades ───────────────────────
function getFilteredTrades(){
  const from   = document.getElementById('date-from').value;
  const to     = document.getElementById('date-to').value;
  const ticker = (document.getElementById('ticker-search').value||'').trim().toUpperCase();
  let trades = allTrades.filter(t => {
    const matchOutcome = currentFilter === 'All' || t.outcome === currentFilter;
    const matchFrom    = !from   || (t.trade_date && t.trade_date >= from);
    const matchTo      = !to     || (t.trade_date && t.trade_date <= to);
    const matchTicker  = !ticker || (t.ticker && t.ticker.toUpperCase().includes(ticker));
    return matchOutcome && matchFrom && matchTo && matchTicker;
  });
  // Sort by trade_date
  trades.sort((a, b) => {
    const da = a.trade_date || '';
    const db = b.trade_date || '';
    return sortAsc ? da.localeCompare(db) : db.localeCompare(da);
  });
  return trades;
}

// ── Sort toggle ───────────────────────────────
function toggleSort(){
  sortAsc = !sortAsc;
  const th = document.getElementById('sort-date');
  th.classList.toggle('sorted-asc', sortAsc);
  th.classList.toggle('sorted-desc', !sortAsc);
  renderTable();
}

// ── Filter ───────────────────────────────────
function setFilter(filter, btn){
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateStats();
  renderTable();
}

function applyDateFilter(){ updateStats(); renderTable(); }

function clearDateFilter(){
  document.getElementById('date-from').value = '';
  document.getElementById('date-to').value   = '';
  updateStats();
  renderTable();
}

// ── Render table ─────────────────────────────
function renderTable(){
  const tbody  = document.getElementById('trades-body');
  const trades = getFilteredTrades();
  const e = v => v ? v : `<span class="empty-val">—</span>`;
  updateStats();

  if(!trades.length){
    tbody.innerHTML = `<tr><td colspan="19"><div class="empty"><h3>No trades found</h3><p>${currentFilter === 'All' ? 'Complete your checklist and click "Save to database".' : 'No '+currentFilter+' trades yet.'}</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = trades.map((t, i) => {
    const date = t.trade_date
      ? t.trade_date + (t.day ? '<br><span style="color:var(--text-muted);font-size:10px;">'+t.day+'</span>' : '')
      : `<span class="empty-val">—</span>`;
    return `<tr>
      <td class="mono" style="color:var(--text-muted);">${i+1}</td>
      <td class="mono" style="font-size:11px;">${date}</td>
      <td style="font-weight:600;color:var(--accent);">${e(t.ticker)}</td>
      <td>${t.trade_type ? `<span class="type-pill type-${t.trade_type}">${t.trade_type}</span>` : `<span class="empty-val">—</span>`}</td>
      <td class="mono" style="font-size:11px;">${e(t.approach)}</td>
      <td class="mono" style="font-size:11px;white-space:nowrap;">${e(t.anchor)}</td>
      <td class="mono" style="font-size:11px;">${e(t.candle)}</td>
      <td class="mono" style="font-size:11px;">${e(t.entry_tf)}</td>
      <td style="font-size:11px;white-space:nowrap;">${e(t.structure)}</td>
      <td style="font-size:11px;white-space:nowrap;">${e(t.ltf_level)}</td>
      <td class="mono">${e(t.ratio)}</td>
      <td class="mono">${e(t.target)}</td>
      <td class="mono exec-sep exec-col">
        <input type="time" class="time-inp" value="${t.entry_time||''}"
          onchange="updateField(${t.id},'entry_time',this.value)"
          style="background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Space Mono',monospace;font-size:11px;padding:4px 8px;outline:none;cursor:pointer;color-scheme:dark;width:110px;" />
      </td>
      <td class="mono exec-col">
        <input type="time" class="time-inp" value="${t.exit_time||''}"
          onchange="updateField(${t.id},'exit_time',this.value)"
          style="background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Space Mono',monospace;font-size:11px;padding:4px 8px;outline:none;cursor:pointer;color-scheme:dark;width:110px;" />
      </td>
      <td class="exec-col">
        <select class="outcome-sel" onchange="updateField(${t.id},'achieved_target',this.value)">
          <option value="" ${!t.achieved_target?'selected':''}>—</option>
          <option ${t.achieved_target==='Target hit'    ?'selected':''}>Target hit</option>
          <option ${t.achieved_target==='Stop loss hit' ?'selected':''}>Stop loss hit</option>
          <option ${t.achieved_target==='Breakeven'     ?'selected':''}>Breakeven</option>
          <option ${t.achieved_target==='Trail stop hit'?'selected':''}>Trail stop hit</option>
        </select>
      </td>
      <td class="exec-col" id="result-${t.id}">
        <div style="display:flex;align-items:center;gap:4px;">
          <input type="text" value="${t.actual_result||''}" placeholder="e.g. 2.5"
            onchange="updateField(${t.id},'actual_result',this.value)"
            style="background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Space Mono',monospace;font-size:11px;padding:4px 8px;outline:none;width:70px;" />
          <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--text-muted);">R</span>
        </div>
      </td>
      <td class="exec-col">
        <select class="outcome-sel" onchange="updateOutcome(${t.id}, this.value)">
          <option ${t.outcome==='Pending'  ?'selected':''}>Pending</option>
          <option ${t.outcome==='Win'      ?'selected':''}>Win</option>
          <option ${t.outcome==='Loss'     ?'selected':''}>Loss</option>
          <option ${t.outcome==='Breakeven'?'selected':''}>Breakeven</option>
        </select>
      </td>
      <td style="font-size:11px;border-left:1px solid rgba(79,158,255,0.2);background:rgba(79,158,255,0.02);white-space:nowrap;">${e(t.news)}</td>
      <td style="background:rgba(79,158,255,0.02);">
        <button class="del-btn" onclick="deleteTrade(${t.id})" title="Delete trade">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5M3 4l1 9h8l1-9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </td>
    </tr>`;
  }).join('');
}

// ── Update any field ─────────────────────────
async function updateField(id, field, value){
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/trades?id=eq.' + id, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ [field]: value || null })
    });
    if(!res.ok) throw new Error('Update failed');
    const trade = allTrades.find(t => t.id === id);
    if(trade) trade[field] = value;
    showToast('Updated ✓');
  } catch(err){
    showToast('Update failed', true);
  }
}

// ── Update outcome ───────────────────────────
async function updateOutcome(id, outcome){
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/trades?id=eq.' + id, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ outcome })
    });
    if(!res.ok) throw new Error('Update failed');
    // Update local data
    const trade = allTrades.find(t => t.id === id);
    if(trade) trade.outcome = outcome;
    updateStats();
    showToast('Outcome updated ✓');
  } catch(err){
    showToast('Update failed', true);
  }
}

// ── Delete trade ─────────────────────────────
async function deleteTrade(id){
  if(!confirm('Delete this trade? This cannot be undone.')) return;
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/trades?id=eq.' + id, {
      method: 'DELETE',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Prefer': 'return=minimal'
      }
    });
    if(!res.ok) throw new Error('Delete failed');
    allTrades = allTrades.filter(t => t.id !== id);
    updateStats();
    renderTable();
    showToast('Trade deleted');
  } catch(err){
    showToast('Delete failed', true);
  }
}
function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isError ? 'error' : '';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Boot
loadTrades();
</script>
