<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — yvco.</title>
<link rel="icon" type="image/png" href="/yvco_logo.png">
<link rel="apple-touch-icon" href="/yvco_logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f12; --surface:#141720; --surface2:#1c2130;
    --border:rgba(255,255,255,0.07); --border-active:rgba(255,255,255,0.18);
    --text:#e8eaf0; --text-muted:#5a6070; --text-dim:#8a94a8;
    --accent:#4f9eff; --accent-dim:rgba(79,158,255,0.12);
    --teal:#00d4a1; --teal-dim:rgba(0,212,161,0.1);
    --amber:#f5a623; --amber-dim:rgba(245,166,35,0.1);
    --purple:#a78bfa; --purple-dim:rgba(167,139,250,0.1);
    --red:#ef4444; --green:#22c55e;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:32px 16px 80px;}
  .app-wrapper{max-width:1100px;margin:0 auto;}

  /* Header */
  header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:36px;gap:12px;}
  .header-left h1{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;letter-spacing:-.5px;}
  .header-left p{font-size:13px;color:var(--text-muted);margin-top:4px;}
  .header-left .creator{font-size:11px;font-family:'Space Mono',monospace;color:var(--amber);margin-top:6px;letter-spacing:.04em;}
  .header-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;align-items:center;}
  .btn-icon{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font-size:12px;font-family:'DM Sans',sans-serif;padding:7px 14px;border-radius:8px;cursor:pointer;transition:all .15s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
  .btn-icon:hover{border-color:var(--border-active);color:var(--text);background:var(--surface2);}
  .btn-icon:disabled{opacity:0.5;cursor:not-allowed;pointer-events:none;}

  /* Refresh spinner */
  @keyframes spin{to{transform:rotate(360deg);}}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid var(--border-active);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;}

  /* Stats row */
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
  .stat-card.featured{border-color:rgba(79,158,255,0.35);box-shadow:0 0 0 3px rgba(79,158,255,0.05);}
  .stat-label{font-size:11px;font-family:'Space Mono',monospace;color:var(--text-muted);letter-spacing:.04em;margin-bottom:6px;}
  .stat-val{font-size:22px;font-family:'Space Mono',monospace;color:var(--text);}
  .stat-val.accent{color:var(--accent);}
  .stat-val.teal{color:var(--teal);}
  .stat-val.amber{color:var(--amber);}

  /* Controls */
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;}
  .control-label{font-size:11px;font-family:'Space Mono',monospace;color:var(--text-muted);letter-spacing:.04em;white-space:nowrap;}
  .min-inp{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Space Mono',monospace;font-size:12px;padding:5px 10px;outline:none;width:60px;text-align:center;-moz-appearance:textfield;}
  .min-inp::-webkit-outer-spin-button,.min-inp::-webkit-inner-spin-button{-webkit-appearance:none;}
  .min-inp:focus{border-color:var(--accent);}
  .sort-sel{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 10px;outline:none;cursor:pointer;color-scheme:dark;}
  .sort-sel option{background:#1c2130;color:var(--text);}
  .sort-sel:focus{border-color:var(--accent);}
  .filter-type{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 10px;outline:none;cursor:pointer;color-scheme:dark;}
  .filter-type option{background:#1c2130;color:var(--text);}
  .filter-type:focus{border-color:var(--accent);}
  .control-divider{width:1px;height:20px;background:var(--border);flex-shrink:0;}

  /* Leaderboard cards */
  .board{display:flex;flex-direction:column;gap:8px;}

  .combo-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;transition:border-color .2s;position:relative;overflow:hidden;}
  .combo-card:hover{border-color:var(--border-active);}
  .combo-card.rank-1{border-color:rgba(245,166,35,0.4);box-shadow:0 0 0 3px rgba(245,166,35,0.05);}
  .combo-card.rank-2{border-color:rgba(138,148,168,0.4);}
  .combo-card.rank-3{border-color:rgba(176,111,74,0.35);}

  /* Win rate bar behind card */
  .combo-card-bg{position:absolute;inset:0;opacity:0.035;pointer-events:none;border-radius:14px;}
  .combo-card-bg.high{background:var(--teal);}
  .combo-card-bg.mid{background:var(--amber);}
  .combo-card-bg.low{background:var(--red);}

  .combo-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .rank-badge{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}
  .rank-badge.r1{background:rgba(245,166,35,0.12);color:var(--amber);border-color:rgba(245,166,35,0.3);}
  .rank-badge.r2{background:rgba(138,148,168,0.1);color:#8a94a8;border-color:rgba(138,148,168,0.3);}
  .rank-badge.r3{background:rgba(176,111,74,0.1);color:#b06f4a;border-color:rgba(176,111,74,0.3);}

  .combo-name{flex:1;font-size:13px;font-weight:500;color:var(--text);font-family:'DM Sans',sans-serif;}
  .combo-winrate{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;flex-shrink:0;}
  .combo-winrate.high{color:var(--teal);}
  .combo-winrate.mid{color:var(--amber);}
  .combo-winrate.low{color:var(--red);}
  .combo-winrate.none{color:var(--text-muted);}

  /* Tags row */
  .combo-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .tag{font-size:10px;font-family:'Space Mono',monospace;padding:2px 8px;border-radius:5px;border:1px solid var(--border);color:var(--text-muted);background:var(--surface2);}
  .tag.type-Reversal{color:var(--purple);border-color:rgba(167,139,250,0.3);background:var(--purple-dim);}
  .tag.type-Continuation{color:var(--teal);border-color:rgba(0,212,161,0.3);background:var(--teal-dim);}
  .tag.approach{color:var(--accent);border-color:rgba(79,158,255,0.25);background:var(--accent-dim);}
  .tag.entry{color:var(--amber);border-color:rgba(245,166,35,0.25);background:var(--amber-dim);}
  .tag.structure{color:var(--text-dim);}
  .tag.ltf{color:var(--text-dim);}

  /* Win/loss bar */
  .combo-bar-wrap{display:flex;align-items:center;gap:8px;}
  .combo-bar-track{flex:1;height:4px;background:var(--surface2);border-radius:999px;overflow:hidden;}
  .combo-bar-fill{height:100%;border-radius:999px;transition:width .4s ease;}
  .combo-bar-fill.high{background:var(--teal);}
  .combo-bar-fill.mid{background:var(--amber);}
  .combo-bar-fill.low{background:var(--red);}
  .combo-stats{font-size:11px;font-family:'Space Mono',monospace;color:var(--text-muted);white-space:nowrap;flex-shrink:0;}
  .combo-stats span.w{color:var(--teal);}
  .combo-stats span.l{color:var(--red);}
  .combo-stats span.p{color:var(--amber);}

  /* Empty / loading */
  .empty{padding:60px 20px;text-align:center;color:var(--text-muted);}
  .empty h3{font-family:'Space Mono',monospace;font-size:14px;margin-bottom:8px;color:var(--text-dim);}
  .empty p{font-size:13px;}
  .loading{padding:40px;text-align:center;font-family:'Space Mono',monospace;font-size:12px;color:var(--text-muted);}

  /* Toast */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--teal);color:#0d1a14;font-size:13px;font-weight:600;padding:10px 20px;border-radius:10px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;font-family:'DM Sans',sans-serif;z-index:9999;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #toast.error{background:var(--red);color:#fff;}

  /* Scrollbar */
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:#141720;}
  ::-webkit-scrollbar-thumb{background:#2a3040;border-radius:999px;}
  ::-webkit-scrollbar-thumb:hover{background:#3a4255;}

  @media(max-width:600px){
    .stats-row{grid-template-columns:1fr 1fr;}
    body{padding:16px 12px 60px;}
    header{flex-direction:column;gap:10px;}
    .controls{gap:8px;}
    .combo-winrate{font-size:15px;}
  }
</style>
</head>
<body>
<div class="app-wrapper">

  <header>
    <div class="header-left">
      <h1>Leaderboard</h1>
      <p>Win rate ranked by setup variation</p>
      <div class="creator">by yvco.</div>
    </div>
    <div class="header-actions">
      <a class="btn-icon" href="/">Checklist</a>
      <a class="btn-icon" href="/history.html">Trade History</a>
      <button class="btn-icon" id="refresh-btn" onclick="loadData()">Refresh</button>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">TOTAL VARIATIONS</div>
      <div class="stat-val accent" id="stat-combos">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">TOTAL TRADES</div>
      <div class="stat-val" id="stat-trades">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">BEST WIN RATE</div>
      <div class="stat-val teal" id="stat-best">—</div>
    </div>
    <div class="stat-card featured">
      <div class="stat-label">AVG WIN RATE</div>
      <div class="stat-val accent" id="stat-avg">—</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <span class="control-label">MIN TRADES</span>
    <input type="number" class="min-inp" id="min-trades" value="1" min="1" max="99" oninput="renderBoard()" />
    <div class="control-divider"></div>
    <span class="control-label">TYPE</span>
    <select class="filter-type" id="filter-type" onchange="renderBoard()">
      <option value="All">All</option>
      <option value="Reversal">Reversal</option>
      <option value="Continuation">Continuation</option>
    </select>
    <div class="control-divider"></div>
    <span class="control-label">SORT BY</span>
    <select class="sort-sel" id="sort-by" onchange="renderBoard()">
      <option value="winrate">Win Rate</option>
      <option value="trades">Most Trades</option>
      <option value="wins">Most Wins</option>
    </select>
  </div>

  <!-- Board -->
  <div class="board" id="board">
    <div class="loading">Loading combos…</div>
  </div>

</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://raiojzsbgftepxhahkly.supabase.co';
const SUPABASE_KEY = 'sb_publishable_kglok1CLL_oVfzAtCiXk1g_FPAmdjAD';

let allCombos = [];

// ── Load & process ────────────────────────────
async function loadData(){
  const btn = document.getElementById('refresh-btn');
  btn.innerHTML = '<span class="spin"></span> Loading';
  btn.disabled = true;

  try {
    const res = await fetch(
      SUPABASE_URL + '/rest/v1/trades?select=trade_type,approach,anchor,candle_4h,entry_tf,structure,ltf_level,result&order=created_at.desc',
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
    );
    if(!res.ok) throw new Error('Failed to load');
    const trades = await res.json();
    allCombos = buildCombos(trades);
    updateStats();
    renderBoard();
    showToast('Loaded ✓');
  } catch(err){
    document.getElementById('board').innerHTML =
      `<div class="empty"><h3>Could not load data</h3><p>${err.message}</p></div>`;
    showToast('Failed to load', true);
  } finally {
    btn.innerHTML = 'Refresh';
    btn.disabled = false;
  }
}

// ── Build combo map ───────────────────────────
function buildCombos(trades){
  const map = {};
  trades.forEach(t => {
    // Build key from all 7 dimensions
    const key = [
      t.trade_type  || '—',
      t.approach    || '—',
      t.anchor      || '—',
      t.candle_4h   || '—',
      t.entry_tf    || '—',
      t.structure   || '—',
      t.ltf_level   || '—'
    ].join('|');

    if(!map[key]){
      map[key] = {
        trade_type: t.trade_type  || '—',
        approach:   t.approach    || '—',
        anchor:     t.anchor      || '—',
        candle_4h:  t.candle_4h   || '—',
        entry_tf:   t.entry_tf    || '—',
        structure:  t.structure   || '—',
        ltf_level:  t.ltf_level   || '—',
        wins: 0, losses: 0, breakeven: 0, pending: 0, total: 0
      };
    }
    map[key].total++;
    const r = (t.result||'').toLowerCase();
    if(r === 'win')           map[key].wins++;
    else if(r === 'loss')     map[key].losses++;
    else if(r === 'breakeven') map[key].breakeven++;
    else                      map[key].pending++;
  });

  return Object.values(map).map(c => {
    const closed = c.wins + c.losses + c.breakeven;
    c.winrate = closed > 0 ? (c.wins / closed) * 100 : null;
    return c;
  });
}

// ── Stats ─────────────────────────────────────
function updateStats(){
  const combos = allCombos;
  const totalTrades = combos.reduce((s,c) => s + c.total, 0);
  const rated = combos.filter(c => c.winrate !== null);
  const best  = rated.length ? Math.max(...rated.map(c=>c.winrate)) : null;
  const avg   = rated.length ? rated.reduce((s,c)=>s+c.winrate,0) / rated.length : null;

  document.getElementById('stat-combos').textContent = combos.length;
  document.getElementById('stat-trades').textContent = totalTrades;
  document.getElementById('stat-best').textContent   = best !== null ? best.toFixed(1) + '%' : '—';
  document.getElementById('stat-avg').textContent    = avg  !== null ? avg.toFixed(1)  + '%' : '—';
}

// ── Win rate color class ──────────────────────
function rateClass(wr){
  if(wr === null) return 'none';
  if(wr >= 60) return 'high';
  if(wr >= 40) return 'mid';
  return 'low';
}

// ── Render board ──────────────────────────────
function renderBoard(){
  const board    = document.getElementById('board');
  const minCount = parseInt(document.getElementById('min-trades').value) || 1;
  const sortBy   = document.getElementById('sort-by').value;
  const typeFilter = document.getElementById('filter-type').value;

  let combos = allCombos.filter(c => {
    const matchMin  = c.total >= minCount;
    const matchType = typeFilter === 'All' || c.trade_type === typeFilter;
    return matchMin && matchType;
  });

  // Sort
  combos.sort((a, b) => {
    if(sortBy === 'winrate'){
      if(a.winrate === null && b.winrate === null) return 0;
      if(a.winrate === null) return 1;
      if(b.winrate === null) return -1;
      return b.winrate - a.winrate;
    }
    if(sortBy === 'trades') return b.total - a.total;
    if(sortBy === 'wins')   return b.wins  - a.wins;
    return 0;
  });

  if(!combos.length){
    board.innerHTML = `<div class="empty"><h3>No variations found</h3><p>Try lowering the minimum trades filter.</p></div>`;
    return;
  }

  board.innerHTML = combos.map((c, i) => {
    const rank   = i + 1;
    const rc     = rateClass(c.winrate);
    const wr     = c.winrate !== null ? c.winrate.toFixed(1) + '%' : '—';
    const barW   = c.winrate !== null ? c.winrate.toFixed(1) : 0;
    const rankCls = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : '';
    const cardCls = rank <= 3 ? `rank-${rank}` : '';

    const structShort = c.structure
      .replace('Consolidation: ','')
      .replace('External Manipulation','Ext. Manip.')
      .replace('Break & Re-test','B&R');

    return `
    <div class="combo-card ${cardCls}">
      <div class="combo-card-bg ${rc}"></div>
      <div class="combo-top">
        <div class="rank-badge ${rankCls}">${rank}</div>
        <div class="combo-name">${c.trade_type} · ${c.approach} · ${c.anchor} · ${c.candle_4h}</div>
        <div class="combo-winrate ${rc}">${wr}</div>
      </div>
      <div class="combo-tags">
        <span class="tag type-${c.trade_type}">${c.trade_type}</span>
        <span class="tag approach">${c.approach}</span>
        <span class="tag">${c.anchor}</span>
        <span class="tag">${c.candle_4h}</span>
        <span class="tag entry">${c.entry_tf}</span>
        <span class="tag structure">${structShort}</span>
        <span class="tag ltf">${c.ltf_level}</span>
      </div>
      <div class="combo-bar-wrap">
        <div class="combo-bar-track">
          <div class="combo-bar-fill ${rc}" style="width:${barW}%"></div>
        </div>
        <div class="combo-stats">
          <span class="w">${c.wins}W</span> · <span class="l">${c.losses}L</span> · <span class="p">${c.pending}P</span> · ${c.total} trades
        </div>
      </div>
    </div>`;
  }).join('');
}

function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isError ? 'error' : '';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Boot
loadData();
</script>
</body>
</html>
