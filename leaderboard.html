<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — yvco.</title>
<link rel="icon" type="image/png" href="/yvco_logo.png">
<link rel="apple-touch-icon" href="/yvco_logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f12; --surface:#141720; --surface2:#1c2130;
    --border:rgba(255,255,255,0.07); --border-active:rgba(255,255,255,0.18);
    --text:#e8eaf0; --text-muted:#5a6070; --text-dim:#8a94a8;
    --accent:#4f9eff; --accent-dim:rgba(79,158,255,0.12);
    --teal:#00d4a1; --teal-dim:rgba(0,212,161,0.1);
    --amber:#f5a623; --amber-dim:rgba(245,166,35,0.1);
    --purple:#a78bfa; --purple-dim:rgba(167,139,250,0.1);
    --red:#ef4444; --green:#22c55e;
    --cyan:#22d3ee; --cyan-dim:rgba(34,211,238,0.08);
    --rose:#fb7185; --rose-dim:rgba(251,113,133,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:32px 16px 80px;}
  .app-wrapper{max-width:1100px;margin:0 auto;}

  /* Header */
  header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:36px;gap:12px;}
  .header-left h1{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;letter-spacing:-.5px;}
  .header-left p{font-size:13px;color:var(--text-muted);margin-top:4px;}
  .header-left .creator{font-size:11px;font-family:'Space Mono',monospace;color:var(--amber);margin-top:6px;letter-spacing:.04em;}
  .header-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;align-items:center;}
  .btn-icon{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font-size:12px;font-family:'DM Sans',sans-serif;padding:7px 14px;border-radius:8px;cursor:pointer;transition:all .15s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
  .btn-icon:hover{border-color:var(--border-active);color:var(--text);background:var(--surface2);}
  .btn-icon:disabled{opacity:0.5;cursor:not-allowed;pointer-events:none;}

  /* Refresh spinner */
  @keyframes spin{to{transform:rotate(360deg);}}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid var(--border-active);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;}

  /* Stats row — 2 cards only */
  .stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
  .stat-label{font-size:11px;font-family:'Space Mono',monospace;color:var(--text-muted);letter-spacing:.04em;margin-bottom:6px;}
  .stat-val{font-size:22px;font-family:'Space Mono',monospace;color:var(--text);}
  .stat-val.accent{color:var(--accent);}

  /* Filters — match trade history style */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
  .filter-group{display:flex;align-items:center;gap:6px;padding:4px 6px;background:var(--surface2);border-radius:10px;}
  .filter-btn{padding:6px 14px;border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-muted);transition:all .15s;}
  .filter-btn:hover{color:var(--text);background:rgba(255,255,255,0.05);}
  .filter-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.3);}
  .filter-divider{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0;}
  .min-inp{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Space Mono',monospace;font-size:12px;padding:5px 10px;outline:none;width:52px;text-align:center;-moz-appearance:textfield;transition:border-color .15s;}
  .min-inp::-webkit-outer-spin-button,.min-inp::-webkit-inner-spin-button{-webkit-appearance:none;}
  .min-inp:focus{border-color:var(--accent);}
  .control-label{font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text-muted);white-space:nowrap;}
  .sort-sel{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 10px;outline:none;cursor:pointer;color-scheme:dark;transition:border-color .15s;}
  .sort-sel option{background:#1c2130;color:var(--text);}
  .sort-sel:focus{border-color:var(--accent);}

  /* Board */
  .board{display:flex;flex-direction:column;gap:8px;}

  /* Combo card */
  .combo-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;transition:border-color .2s;}
  .combo-card:hover{border-color:var(--border-active);}

  /* Card top row */
  .combo-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .rank-num{font-family:'Space Mono',monospace;font-size:11px;color:var(--text-muted);width:20px;flex-shrink:0;text-align:right;}
  .combo-code{flex:1;font-family:'Space Mono',monospace;font-size:11px;color:var(--rose);letter-spacing:.02em;}
  .combo-winrate{font-family:'Space Mono',monospace;font-size:14px;font-weight:400;flex-shrink:0;}
  .combo-winrate.high{color:var(--teal);}
  .combo-winrate.mid{color:var(--amber);}
  .combo-winrate.low{color:var(--red);}
  .combo-winrate.none{color:var(--text-muted);}

  /* Tags */
  .combo-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
  .tag{font-size:10px;font-family:'Space Mono',monospace;padding:2px 8px;border-radius:5px;border:1px solid var(--border);color:var(--text-muted);background:var(--surface2);}
  .tag.type-Reversal{color:var(--purple);border-color:rgba(167,139,250,0.3);background:var(--purple-dim);}
  .tag.type-Continuation{color:var(--teal);border-color:rgba(0,212,161,0.3);background:var(--teal-dim);}
  .tag.t-approach{color:var(--accent);border-color:rgba(79,158,255,0.25);background:var(--accent-dim);}
  .tag.t-anchor{color:var(--amber);border-color:rgba(245,166,35,0.25);background:var(--amber-dim);}
  .tag.t-candle{color:#ff6b6b;border-color:rgba(255,107,107,0.25);background:rgba(255,107,107,0.08);}
  .tag.t-entry{color:var(--green);border-color:rgba(34,197,94,0.25);background:rgba(34,197,94,0.08);}
  .tag.t-structure{color:var(--cyan);border-color:rgba(34,211,238,0.25);background:var(--cyan-dim);}

  /* Ticker toggle */
  .ticker-toggle{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);cursor:pointer;user-select:none;width:fit-content;}
  .ticker-toggle-label{font-size:10px;font-family:'Space Mono',monospace;color:var(--text-muted);letter-spacing:.04em;transition:color .15s;}
  .ticker-toggle:hover .ticker-toggle-label{color:var(--text-dim);}
  .ticker-arrow{font-size:9px;color:var(--text-muted);transition:transform .2s;}
  .ticker-arrow.open{transform:rotate(180deg);}
  .ticker-list{display:none;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .ticker-list.open{display:flex;}
  .ticker-chip{font-size:10px;font-family:'Space Mono',monospace;padding:2px 8px;border-radius:5px;border:1px solid rgba(251,113,133,0.25);color:var(--rose);background:var(--rose-dim);}
  .combo-bar-wrap{display:flex;align-items:center;gap:8px;}
  .combo-bar-track{flex:1;height:2px;background:var(--surface2);border-radius:999px;overflow:hidden;}
  .combo-bar-fill{height:100%;border-radius:999px;transition:width .4s ease;}
  .combo-bar-fill.high{background:var(--teal);}
  .combo-bar-fill.mid{background:var(--amber);}
  .combo-bar-fill.low{background:var(--red);}
  .combo-bar-fill.none{background:var(--border-active);}
  .combo-stats{font-size:11px;font-family:'Space Mono',monospace;color:var(--text-muted);white-space:nowrap;flex-shrink:0;}
  .combo-stats span.w{color:var(--teal);}
  .combo-stats span.l{color:var(--red);}

  /* Empty / loading */
  .empty{padding:60px 20px;text-align:center;color:var(--text-muted);}
  .empty h3{font-family:'Space Mono',monospace;font-size:14px;margin-bottom:8px;color:var(--text-dim);}
  .empty p{font-size:13px;}
  .loading{padding:40px;text-align:center;font-family:'Space Mono',monospace;font-size:12px;color:var(--text-muted);}

  /* Toast */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--teal);color:#0d1a14;font-size:13px;font-weight:600;padding:10px 20px;border-radius:10px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;font-family:'DM Sans',sans-serif;z-index:9999;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #toast.error{background:var(--red);color:#fff;}

  /* Scrollbar */
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:#141720;}
  ::-webkit-scrollbar-thumb{background:#2a3040;border-radius:999px;}
  ::-webkit-scrollbar-thumb:hover{background:#3a4255;}

  @media(max-width:600px){
    .stats-row{grid-template-columns:1fr 1fr;}
    body{padding:16px 12px 60px;}
    header{flex-direction:column;gap:10px;}
    .filters{gap:6px;}
    .filter-group{flex-wrap:wrap;gap:4px;}
    .filter-btn{padding:5px 10px;font-size:11px;}
    .filter-divider{display:none;}
  }
</style>
</head>
<body>
<div class="app-wrapper">

  <header>
    <div class="header-left">
      <h1>Leaderboard</h1>
      <p>Win rate ranked by setup variation</p>
      <div class="creator">by yvco.</div>
    </div>
    <div class="header-actions">
      <a class="btn-icon" href="/">Checklist</a>
      <a class="btn-icon" href="/history.html">Trade History</a>
      <button class="btn-icon" id="refresh-btn" onclick="loadData()">Refresh</button>
    </div>
  </header>

  <!-- Stats — 2 cards only -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">TOTAL VARIATIONS</div>
      <div class="stat-val accent" id="stat-variations">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">TOTAL TRADES</div>
      <div class="stat-val" id="stat-trades">—</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-group">
      <button class="filter-btn active" data-filter="All" onclick="setTypeFilter('All',this)">All</button>
      <button class="filter-btn" data-filter="Reversal" onclick="setTypeFilter('Reversal',this)">Reversal</button>
      <button class="filter-btn" data-filter="Continuation" onclick="setTypeFilter('Continuation',this)">Continuation</button>
    </div>
    <div class="filter-divider"></div>
    <span class="control-label">Min trades</span>
    <input type="number" class="min-inp" id="min-trades" value="1" min="1" max="99" oninput="renderBoard()" />
    <div class="filter-divider"></div>
    <span class="control-label">Sort</span>
    <select class="sort-sel" id="sort-by" onchange="renderBoard()">
      <option value="winrate">Win Rate</option>
      <option value="trades">Most Trades</option>
      <option value="wins">Most Wins</option>
    </select>
  </div>

  <!-- Board -->
  <div class="board" id="board">
    <div class="loading">Loading variations…</div>
  </div>

</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://raiojzsbgftepxhahkly.supabase.co';
const SUPABASE_KEY = 'sb_publishable_kglok1CLL_oVfzAtCiXk1g_FPAmdjAD';

let allVariations = [];
let currentTypeFilter = 'All';

// ── Abbreviation maps ─────────────────────────
const typeAbbr = { 'Reversal':'REV', 'Continuation':'CON' };
const approachAbbr = { 'Conservative':'CONS', 'Aggressive':'AGG' };
const structureAbbr = {
  'Retracement': 'RET',
  'Consolidation: External Manipulation': 'EXT',
  'Consolidation: Break & Re-test': 'BNR'
};

function buildCode(v){
  const t  = typeAbbr[v.trade_type]   || v.trade_type   || '—';
  const ap = approachAbbr[v.approach] || v.approach     || '—';
  const an = v.anchor                 || '—';
  const ca = v.candle_4h              || '—';
  const en = v.entry_tf               || '—';
  const st = structureAbbr[v.structure] || v.structure  || '—';
  return `${t}-${ap}-${an}-${ca}-${en}-${st}`;
}

// ── Load & process ────────────────────────────
async function loadData(){
  const btn = document.getElementById('refresh-btn');
  btn.innerHTML = '<span class="spin"></span> Loading';
  btn.disabled = true;

  try {
    const res = await fetch(
      SUPABASE_URL + '/rest/v1/trades?select=trade_type,approach,anchor,candle_4h,entry_tf,structure,result,ticker&order=created_at.desc',
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
    );
    if(!res.ok) throw new Error('Failed to load');
    const trades = await res.json();
    allVariations = buildVariations(trades);
    updateStats();
    renderBoard();
    showToast('Loaded ✓');
  } catch(err){
    document.getElementById('board').innerHTML =
      `<div class="empty"><h3>Could not load data</h3><p>${err.message}</p></div>`;
    showToast('Failed to load', true);
  } finally {
    btn.innerHTML = 'Refresh';
    btn.disabled = false;
  }
}

// ── Build variation map (Step 1–4 only, no LTF) ─
function buildVariations(trades){
  const map = {};
  trades.forEach(t => {
    const key = [
      t.trade_type || '—',
      t.approach   || '—',
      t.anchor     || '—',
      t.candle_4h  || '—',
      t.entry_tf   || '—',
      t.structure  || '—'
    ].join('|');

    if(!map[key]){
      map[key] = {
        trade_type: t.trade_type || '—',
        approach:   t.approach   || '—',
        anchor:     t.anchor     || '—',
        candle_4h:  t.candle_4h  || '—',
        entry_tf:   t.entry_tf   || '—',
        structure:  t.structure  || '—',
        wins: 0, losses: 0, total: 0,
        tickers: {}
      };
    }

    // Track ticker counts
    if(t.ticker){
      map[key].tickers[t.ticker] = (map[key].tickers[t.ticker] || 0) + 1;
    }

    const r = (t.result || '').toLowerCase();
    if(r === 'win'){
      map[key].wins++;
      map[key].total++;
    } else if(r === 'loss'){
      map[key].losses++;
      map[key].total++;
    }
    // Pending and Breakeven excluded from count
  });

  return Object.values(map).map(c => {
    const closed = c.wins + c.losses;
    c.winrate = closed > 0 ? (c.wins / closed) * 100 : null;
    return c;
  }).filter(c => c.total > 0); // only show variations with at least 1 closed trade
}

// ── Stats ─────────────────────────────────────
function updateStats(){
  const total = allVariations.reduce((s,c) => s + c.total, 0);
  document.getElementById('stat-variations').textContent = allVariations.length;
  document.getElementById('stat-trades').textContent = total;
}

// ── Rate class ────────────────────────────────
function rateClass(wr){
  if(wr === null) return 'none';
  if(wr >= 60) return 'high';
  if(wr >= 40) return 'mid';
  return 'low';
}

// ── Type filter ───────────────────────────────
function setTypeFilter(type, btn){
  currentTypeFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderBoard();
}

// ── Render board ──────────────────────────────
function renderBoard(){
  const board    = document.getElementById('board');
  const minCount = parseInt(document.getElementById('min-trades').value) || 1;
  const sortBy   = document.getElementById('sort-by').value;

  let variations = allVariations.filter(c => {
    const matchMin  = c.total >= minCount;
    const matchType = currentTypeFilter === 'All' || c.trade_type === currentTypeFilter;
    return matchMin && matchType;
  });

  variations.sort((a, b) => {
    if(sortBy === 'winrate'){
      if(a.winrate === null && b.winrate === null) return 0;
      if(a.winrate === null) return 1;
      if(b.winrate === null) return -1;
      return b.winrate - a.winrate;
    }
    if(sortBy === 'trades') return b.total - a.total;
    if(sortBy === 'wins')   return b.wins  - a.wins;
    return 0;
  });

  if(!variations.length){
    board.innerHTML = `<div class="empty"><h3>No variations found</h3><p>Try lowering the minimum trades filter.</p></div>`;
    return;
  }

  board.innerHTML = variations.map((c, i) => {
    const rank   = i + 1;
    const rc     = rateClass(c.winrate);
    const wr     = c.winrate !== null ? c.winrate.toFixed(1) + '%' : '—';
    const barW   = c.winrate !== null ? c.winrate.toFixed(1) : 0;
    const code   = buildCode(c);

    const tickerChips = Object.entries(c.tickers)
      .sort((a,b) => b[1]-a[1])
      .map(([t,n]) => `<span class="ticker-chip">${t} (${n})</span>`)
      .join('');
    const tickerCount = Object.keys(c.tickers).length;

    return `
    <div class="combo-card">
      <div class="combo-top">
        <div class="rank-num">${rank}</div>
        <div class="combo-code">${code}</div>
        <div class="combo-winrate ${rc}">${wr}</div>
      </div>
      <div class="combo-tags">
        <span class="tag type-${c.trade_type}">${c.trade_type}</span>
        <span class="tag t-approach">${c.approach}</span>
        <span class="tag t-anchor">${c.anchor}</span>
        <span class="tag t-candle">${c.candle_4h}</span>
        <span class="tag t-entry">${c.entry_tf}</span>
        <span class="tag t-structure">${c.structure}</span>
      </div>
      <div class="combo-bar-wrap">
        <div class="combo-bar-track">
          <div class="combo-bar-fill ${rc}" style="width:${barW}%"></div>
        </div>
        <div class="combo-stats">
          <span class="w">${c.wins}W</span> · <span class="l">${c.losses}L</span> · ${c.total} trades
        </div>
      </div>
      ${tickerCount > 0 ? `
      <div class="ticker-toggle" onclick="toggleTickers(this)">
        <span class="ticker-toggle-label">TICKERS (${tickerCount})</span>
        <span class="ticker-arrow">▾</span>
      </div>
      <div class="ticker-list">${tickerChips}</div>` : ''}
    </div>`;
  }).join('');
}

function toggleTickers(toggleEl){
  const arrow = toggleEl.querySelector('.ticker-arrow');
  const list  = toggleEl.nextElementSibling;
  const isOpen = list.classList.contains('open');
  list.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
}

function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isError ? 'error' : '';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

loadData();
</script>
</body>
</html>
