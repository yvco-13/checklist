<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Trade Checklist</title>
<meta name="theme-color" content="#0d0f12">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#0d0f12; --surface:#141720; --surface2:#1c2130;
    --border:rgba(255,255,255,0.07); --border-active:rgba(255,255,255,0.18);
    --text:#e8eaf0; --text-muted:#5a6070; --text-dim:#8a94a8;
    --accent:#4f9eff; --accent-dim:rgba(79,158,255,0.12);
    --teal:#00d4a1; --teal-dim:rgba(0,212,161,0.1);
    --amber:#f5a623;
    --red:#ef4444; --green:#22c55e;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--text);
    font-family:'DM Sans',sans-serif;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px 16px;
  }

  .login-wrap{width:100%;max-width:380px;}

  .login-header{text-align:center;margin-bottom:32px;}
  .login-header h1{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;letter-spacing:-.5px;color:var(--text);}
  .login-header p{font-size:13px;color:var(--text-muted);margin-top:6px;}
  .login-header .creator{font-size:11px;font-family:'Space Mono',monospace;color:var(--amber);margin-top:6px;letter-spacing:.04em;}

  .login-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:28px 24px;
  }

  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
  .field label{font-size:11px;font-family:'Space Mono',monospace;color:var(--text-muted);letter-spacing:.05em;}
  .field input{
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text);
    font-family:'DM Sans',sans-serif;
    font-size:14px;
    padding:11px 14px;
    outline:none;
    transition:border-color .15s;
    width:100%;
  }
  .field input:focus{border-color:var(--accent);}
  .field input::placeholder{color:var(--text-muted);}
  .field input.error{border-color:var(--red);}

  .btn-login{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    background:var(--teal);
    color:#0d1a14;
    font-family:'DM Sans',sans-serif;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:opacity .15s;
    margin-top:4px;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn-login:hover{opacity:.88;}
  .btn-login:disabled{opacity:.5;cursor:not-allowed;}

  .error-msg{
    background:rgba(239,68,68,0.08);
    border:1px solid rgba(239,68,68,0.25);
    border-radius:8px;
    padding:10px 14px;
    font-size:12px;
    color:#fca5a5;
    margin-bottom:16px;
    display:none;
  }
  .error-msg.show{display:block;}

  .spinner{
    width:16px;height:16px;
    border:2px solid rgba(13,26,20,0.3);
    border-top-color:#0d1a14;
    border-radius:50%;
    animation:spin .6s linear infinite;
    display:none;
  }
  .btn-login.loading .spinner{display:block;}
  .btn-login.loading .btn-text{opacity:0.7;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
  .private-note{
    text-align:center;
    font-size:11px;
    font-family:'Space Mono',monospace;
    color:var(--text-muted);
    margin-top:20px;
    letter-spacing:.02em;
  }
  .private-note span{color:var(--amber);}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-header">
    <h1>Trade Checklist</h1>
    <p>Sign in to access your dashboard</p>
    <div class="creator">by yvco.</div>
  </div>

  <div class="login-card">
    <div class="error-msg" id="error-msg"></div>

    <div class="field">
      <label>EMAIL</label>
      <input type="email" id="inp-email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <div class="field">
      <label>PASSWORD</label>
      <input type="password" id="inp-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>

    <button class="btn-login" id="btn-login" onclick="doLogin()">
      <div class="spinner"></div>
      <span class="btn-text">Sign In</span>
    </button>

    <hr class="divider">
    <div class="private-note">🔒 <span>Private access only.</span> Registration is disabled.</div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://raiojzsbgftepxhahkly.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_kglok1CLL_oVfzAtCiXk1g_FPAmdjAD';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // If already logged in, redirect to main app
  supabase.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = '/index.html';
  });

  async function doLogin() {
    const email = document.getElementById('inp-email').value.trim();
    const password = document.getElementById('inp-password').value;
    const btn = document.getElementById('btn-login');
    const errEl = document.getElementById('error-msg');

    errEl.classList.remove('show');
    document.getElementById('inp-email').classList.remove('error');
    document.getElementById('inp-password').classList.remove('error');

    if (!email || !password) {
      showError('Please enter your email and password.');
      if (!email) document.getElementById('inp-email').classList.add('error');
      if (!password) document.getElementById('inp-password').classList.add('error');
      return;
    }

    btn.disabled = true;
    btn.classList.add('loading');
    btn.querySelector('.btn-text').textContent = 'Signing in…';

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      showError('Invalid email or password. Please try again.');
      btn.disabled = false;
      btn.classList.remove('loading');
      btn.querySelector('.btn-text').textContent = 'Sign In';
      document.getElementById('inp-email').classList.add('error');
      document.getElementById('inp-password').classList.add('error');
    } else {
      btn.querySelector('.btn-text').textContent = 'Redirecting…';
      window.location.href = '/index.html';
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
  }
</script>
</body>
</html>
